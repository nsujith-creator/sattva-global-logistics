      <h1 style="font-size:2rem;color:#050A30;margin-bottom:12px;">FCL Freight Forwarding from India to Gulf, Red Sea &amp; East Africa</h1>
      <p style="font-size:1.1rem;margin-bottom:24px;">Practical export freight support for Indian exporters shipping 20GP, 40GP and 40HC containers from JNPT (Nhava Sheva), Mundra, Chennai and Cochin. 20+ years of freight forwarding experience. 1,000+ FCL shipments handled. 40+ destinations covered.</p>

      <h2 style="font-size:1.3rem;color:#024AAB;margin:24px 0 10px;">Trade Lanes We Operate</h2>
      <ul style="line-height:2;padding-left:20px;">
        <li>India to Jebel Ali (Dubai, UAE)</li>
        <li>India to Dammam &amp; Jeddah (Saudi Arabia)</li>
        <li>India to Mombasa (Kenya)</li>
        <li>India to Dar es Salaam (Tanzania)</li>
        <li>India to Djibouti</li>
        <li>India to Port Sudan &amp; Red Sea ports</li>
        <li>India to Colombo, Oman, Bahrain, Kuwait</li>
        <li>India to Europe via major gateways</li>
      </ul>

      <h2 style="font-size:1.3rem;color:#024AAB;margin:24px 0 10px;">Services</h2>
      <ul style="line-height:2;padding-left:20px;">
        <li>FCL ocean freight booking — 20GP, 40GP, 40HC</li>
        <li>Export documentation coordination (BL, COO, packing list)</li>
        <li>Carrier rate comparison — Maersk, CMA CGM, MSC, Hapag-Lloyd, OOCL</li>
        <li>Shipment follow-up from stuffing to BL release</li>
        <li>Freight advisory for Gulf, Red Sea and East Africa lanes</li>
      </ul>

      <h2 style="font-size:1.3rem;color:#024AAB;margin:24px 0 10px;">Who We Work With</h2>
      <ul style="line-height:2;padding-left:20px;">
        <li>Indian exporters shipping garments, FMCG, agro commodities and engineering goods</li>
        <li>Manufacturers moving 1–10 FCL containers per month</li>
        <li>Traders needing direct operator attention, not a call-centre queue</li>
        <li>First-time exporters who need clear documentation and freight guidance</li>
      </ul>

      <h2 style="font-size:1.3rem;color:#024AAB;margin:24px 0 10px;">Frequently Asked Questions</h2>

      <p><strong>What details are needed for an FCL freight quote?</strong><br/>
      Origin port or ICD, destination port, container type (20GP / 40GP / 40HC), commodity, approximate gross weight, and target sailing date.</p>

      <p style="margin-top:12px;"><strong>Which Indian ports do you handle?</strong><br/>
      JNPT (Nhava Sheva), Mundra, Chennai and Cochin. Inland ICD pickup coordination is also possible for select origins.</p>

      <p style="margin-top:12px;"><strong>Do you handle customs clearance?</strong><br/>
      We coordinate export documentation and liaise with your CHA. We do not act as a customs broker or CHA directly.</p>

      <p style="margin-top:12px;"><strong>Can you support first-time exporters?</strong><br/>
      Yes. We provide practical guidance on FCL booking, documentation sequence, and carrier selection for exporters new to ocean freight.</p>

      <p style="margin-top:12px;"><strong>How quickly will I receive a freight quote?</strong><br/>
      Typically within 24 hours on working days, subject to carrier rate availability for the requested lane and sailing window.</p>
